<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B1916" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#EDEAE2" media="(prefers-color-scheme: light)">
<title>edit — chronicle</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="back-row">
    <a class="back-link" href="/view/{{ token }}">&larr; chronicle</a>
  </div>
  <h1 class="page-title">Edit</h1>

  {% if error %}<div class="error-banner">{{ error }}</div>{% endif %}

  <section>
    <div class="paper-card">
      <form class="edit-form" method="post" action="/view/{{ token }}/{{ item.id }}/edit" id="edit-form">
        <input type="hidden" name="tz_offset_minutes" id="tz_offset_minutes" value="0">
        <div class="field-group">
          <input type="text" name="title" placeholder="Title" required class="field field-title" value="{{ item.title }}">
        </div>
        <div class="field-group">
          <textarea name="content" placeholder="Notes (optional)" class="field" rows="3">{{ item.content }}</textarea>
        </div>
        <div class="field-group">
          <input type="text" name="tags" placeholder="Tags, comma separated" class="field" value="{{ item.tags|join(', ') }}">
        </div>
        <div class="field-row">
          <div class="field-group">
            <span class="field-caption">starts</span>
            <input type="datetime-local" name="start" id="start-input" class="field">
          </div>
          <div class="field-group">
            <span class="field-caption">ends</span>
            <input type="datetime-local" name="end" id="end-input" class="field">
          </div>
        </div>
        <p class="hint">Leave both blank for a note, fill starts only for a reminder, fill both for an event. Clearing a field removes it.</p>
        <button type="submit" class="fill-btn">Save</button>
      </form>
    </div>
  </section>

  <section>
    <form method="post" action="/view/{{ token }}/{{ item.id }}/delete" onsubmit="return confirm('Delete this item?')">
      <button type="submit" class="ghost-btn">Delete item</button>
    </form>
  </section>

  <script>
    document.getElementById('tz_offset_minutes').value = new Date().getTimezoneOffset();

    function toLocalInputValue(utcIso) {
      if (!utcIso) return '';
      const d = new Date(utcIso);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    const startUtc = {{ (item.start or "") | tojson }};
    const endUtc = {{ (item.end or "") | tojson }};
    if (startUtc) document.getElementById('start-input').value = toLocalInputValue(startUtc);
    if (endUtc) document.getElementById('end-input').value = toLocalInputValue(endUtc);
  </script>
</body>
</html>
