<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B1916" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#EDEAE2" media="(prefers-color-scheme: light)">
<title>chronicle</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-shell">
  <div class="login-card">
    <div class="login-header">
      <span class="mark">{% include "_mark.html" %}</span>
      <span class="wordmark">chronicle</span>
    </div>

    {% if error %}<div class="error-banner">{{ error }}</div>{% endif %}

    <form class="login-form" method="post" action="/login">
      <input type="password" name="password" placeholder="Password" required autofocus class="field" autocomplete="current-password">
      <button type="submit" class="fill-btn full">Sign in</button>
    </form>
  </div>
</body>
</html>
