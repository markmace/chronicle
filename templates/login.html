<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0b0f" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
<title>Chronicle</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  body { display: flex; align-items: center; min-height: 100vh; padding-top: 0; padding-bottom: 0; }
  .login-card { width: 100%; }
  .login-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }
  .login-header h1 { font-size: 22px; font-weight: 700; margin: 0; }
  form.login-form {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
</style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="header-mark" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="5" width="14" height="2" rx="1" fill="white" fill-opacity="0.95"/>
          <rect x="4" y="10" width="10" height="2" rx="1" fill="white" fill-opacity="0.75"/>
          <rect x="4" y="15" width="12" height="2" rx="1" fill="white" fill-opacity="0.55"/>
        </svg>
      </div>
      <h1>Chronicle</h1>
    </div>

    {% if error %}<div class="error-banner">{{ error }}</div>{% endif %}

    <form class="login-form card-list" method="post" action="/login">
      <input type="password" name="password" placeholder="Password" required autofocus class="field" autocomplete="current-password">
      <button type="submit" class="save-btn" style="align-self: stretch;">Sign in</button>
    </form>
  </div>
</body>
</html>
