# fly.toml app configuration file generated for chronicle-honeyed-inlet-2183 on 2026-07-03T11:55:42-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chronicle-honeyed-inlet-2183'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep exactly 1 machine always running: FastMCP's streamable-http sessions live
  # in process memory, not shared storage. min=0 (scale-to-zero) or >1 machines
  # both cause "session not found" 404s — either the machine restarts mid-session,
  # or the client's session lands on a machine that never saw it get created.
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
